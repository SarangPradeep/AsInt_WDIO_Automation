name: Selenium Suite Runner

on:
  workflow_dispatch:
jobs:
  run-tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        environment: [GCP, BTP]
        suiteType: [Functional, Regression, Negative]
        browser: [chrome]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2

      - name: Set Environment and Suite Path
        run: |
          if [ "${{ matrix.environment }}" == "BTP" ]; then
            echo "WORK_DIR=Selenium/BTP" >> $GITHUB_ENV
            if [ "${{ matrix.suiteType }}" == "Functional" ]; then
              echo "SUITE_PATH=src/test/resources/testrunners/assetInspectionFunctionalRunnerFile.xml" >> $GITHUB_ENV
            elif [ "${{ matrix.suiteType }}" == "Negative" ]; then
              echo "SUITE_PATH=src/test/resources/testrunners/assetInspectionNegativeRunnerFile.xml" >> $GITHUB_ENV
            else
              echo "SUITE_PATH=src/test/resources/testrunners/assetInspectionRegressionRunnerFile.xml" >> $GITHUB_ENV
            fi
          else
            echo "WORK_DIR=Selenium/GCP" >> $GITHUB_ENV
            if [ "${{ matrix.suiteType }}" == "Functional" ]; then
              echo "SUITE_PATH=src/test/resources/testrunners/gcpFunctionalRunnerFile.xml" >> $GITHUB_ENV
            elif [ "${{ matrix.suiteType }}" == "Negative" ]; then
              echo "SUITE_PATH=src/test/resources/testrunners/gcpNegativeRunnerFile.xml" >> $GITHUB_ENV
            else
              echo "SUITE_PATH=src/test/resources/testrunners/gcpRegressionRunnerFile.xml" >> $GITHUB_ENV
            fi
          fi

      - name: Run Selected TestNG Suite
        working-directory: ${{ env.WORK_DIR }}
        run: mvn clean test -Dsurefire.suiteXmlFiles=${{ env.SUITE_PATH }} -Dbrowser=${{ matrix.browser }}

      - name: Install Allure
        if: always()
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip
          wget https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.zip
          unzip allure-2.29.0.zip
          sudo mv allure-2.29.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      # Generate Allure HTML Report
      - name: Generate Allure Report
        if: always()
        working-directory: ${{ env.WORK_DIR }}
        run: |
          allure generate target/allure-results --clean -o target/allure-report

      # Upload Allure HTML Report
      - name: Upload Allure HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-html-${{ matrix.environment }}-${{ matrix.suiteType }}-${{ matrix.browser }}-${{ github.run_id }}
          path: ${{ env.WORK_DIR }}/target/allure-report

      - name: Upload TestNG Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testng-${{ matrix.environment }}-${{ matrix.suiteType }}-${{ matrix.browser }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ env.WORK_DIR }}/test-output
            ${{ env.WORK_DIR }}/target/surefire-reports
