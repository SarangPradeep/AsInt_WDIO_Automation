name: Run WDIO Tests

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '30 22 * * 0-4'

jobs:
  wdio:
    runs-on: ubuntu-latest

    env:
      CI: true
      SAP_USERNAME: ${{ secrets.SAP_USERNAME }}
      SAP_PASSWORD: ${{ secrets.SAP_PASSWORD }}
      APP_URL: ${{ secrets.APP_URL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-0 \
            libgbm-dev \
            libnotify-dev \
            libnss3 \
            libxss1 \
            libasound2t64 \
            libxtst6 \
            xdg-utils \
            xvfb

      - name: Clean old Allure files
        run: |
          rm -rf allure-results
          rm -rf allure-report
          rm -rf gh-pages

      - name: Run WDIO tests in parallel (4 workers)
        run: npx wdio run wdio.conf.ts --maxInstances 4
        continue-on-error: true

      - name: Download previous Allure history
        if: always()
        run: |
          git clone --depth 1 --branch gh-pages https://github.com/${{ github.repository }} gh-pages || true
          mkdir -p allure-results/history
          cp -r gh-pages/history/* allure-results/history || true

      - name: Generate Allure Report
        if: always()
        run: |
          npm install -g allure-commandline
          allure generate ./allure-results --clean -o ./allure-report

      - name: Upload Allure Report Artifact (downloadable)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Deploy Allure Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./allure-report
          force_orphan: true

      - name: Add report link to workflow summary
        if: always()
        run: |
          echo "## 🧪 Allure Report" >> $GITHUB_STEP_SUMMARY
          echo "Open report: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" >> $GITHUB_STEP_SUMMARY
