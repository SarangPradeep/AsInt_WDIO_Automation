name: Run WDIO Tests

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  wdio:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-0 \
            libgbm-dev \
            libnotify-dev \
            libnss3 \
            libxss1 \
            libasound2t64 \
            libxtst6 \
            xdg-utils \
            xvfb

      - name: Run WDIO tests in parallel (4 workers)
        working-directory: asint_ais_e2e
        env:
          CI: true
        run: npx wdio run wdio.conf.ts --maxInstances 4
        continue-on-error: true

      - name: Generate Allure Report
        if: always()              # run even if tests fail
        run: |
          npm install -g allure-commandline
          allure generate ./allure-results --clean -o ./allure-report

      - name: Upload Allure Report
        if: always()              # run even if tests fail
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
