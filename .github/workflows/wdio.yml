name: Run WDIO Tests

on:
  workflow_dispatch:
  schedule:
    - cron: '30 22 * * 0-4'

jobs:
  wdio:
    runs-on: ubuntu-latest

    env:
      CI: true
      SAP_USERNAME: ${{ secrets.SAP_USERNAME }}
      SAP_PASSWORD: ${{ secrets.SAP_PASSWORD }}
      APP_URL: ${{ secrets.APP_URL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-0 \
            libgbm-dev \
            libnotify-dev \
            libnss3 \
            libxss1 \
            libasound2t64 \
            libxtst6 \
            xdg-utils \
            xvfb
            
      - name: Debug env variables
        run: |
          echo "CI=$CI"
          echo "APP_URL length: ${#APP_URL}"
          echo "SAP_USERNAME length: ${#SAP_USERNAME}"
          echo "SAP_PASSWORD length: ${#SAP_PASSWORD}"
          
      - name: Run WDIO tests in parallel (4 workers)
        run: npx wdio run wdio.conf.ts --maxInstances 4
        continue-on-error: true

      - name: Generate Allure Report
        if: always()              # run even if tests fail
        run: |
          npm install -g allure-commandline
          allure generate ./allure-results --clean -o ./allure-report

      - name: Upload Allure Report
        if: always()              # run even if tests fail
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Deploy Allure Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./allure-report
          force_orphan: true

      - name: Add report link to workflow summary
        if: always()
        run: |
          echo "## 🧪 Allure Report" >> $GITHUB_STEP_SUMMARY
          echo "Open report: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" >> $GITHUB_STEP_SUMMARY
