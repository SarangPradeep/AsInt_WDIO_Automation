name: Asset Inspection Runner - Manual Trigger (Allure)

on:
  workflow_dispatch:
    inputs:
      browser:
        description: "Browser to run (chrome | edge | both)"
        required: true
        default: both
        type: choice
        options:
          - chrome
          - edge
          - both

jobs:
  sit2-tests:
    name: Asset Inspection Tests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, edge]

    steps:
      # ---------------------------
      # Checkout
      # ---------------------------
      - name: Checkout source code
        uses: actions/checkout@v4

      # ---------------------------
      # Java setup
      # ---------------------------
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ---------------------------
      # Maven cache
      # ---------------------------
      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}

      # ---------------------------
      # Browser setup
      # ---------------------------
      - name: Setup Google Chrome
        if: matrix.browser == 'chrome'
        uses: browser-actions/setup-chrome@v1

      - name: Setup Microsoft Edge
        if: matrix.browser == 'edge'
        uses: browser-actions/setup-edge@v1

      # ---------------------------
      # Test execution
      # ---------------------------
      - name: Run Asset Inspection Test Suite
        if: |
          github.event.inputs.browser == 'both' ||
          github.event.inputs.browser == matrix.browser
        env:
          CI: true
        run: |
          mvn -B clean test \
            -Dbrowser=${{ matrix.browser }} \
            -Dheadless=true \
            -Dsurefire.suiteXmlFiles=src/test/resources/testrunners/assetInspectionGithubRunnerFile.xml

      # ---------------------------
      # Upload Allure Results
      # ---------------------------
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: target/allure-results

      # ---------------------------
      # Upload TestNG Reports
      # ---------------------------
      - name: Upload TestNG Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testng-reports-${{ matrix.browser }}
          path: |
            test-output/
            target/surefire-reports/
