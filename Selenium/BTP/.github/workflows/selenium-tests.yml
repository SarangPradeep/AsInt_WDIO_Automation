name: Run Selenium Tests (Nightly)

on:
  schedule:
    - cron: "30 21 * * *"   # 21:30 UTC = 03:00 IST
  workflow_dispatch:        # optional: allows manual run if needed

jobs:
  regression:
    name: Run Regression Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2

      - name: Run Regression (TestNG) Tests
        run: mvn clean test -DsuiteXmlFile=apm02_regression.xml

      - name: Upload Regression Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apm02-regression-report
          path: target/surefire-reports/
